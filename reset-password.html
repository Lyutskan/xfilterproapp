<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Şifre Sıfırla – X Filter Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #060610;
  --bg2: #0a0a18;
  --surface: #0e0e1e;
  --surface2: #121224;
  --border: #161628;
  --border2: #1c1c34;
  --cyan: #6ee7f7;
  --pink: #f97cf5;
  --green: #4fffb0;
  --gold: #ffd166;
  --text: #eeeef8;
  --muted: #5a5a7a;
  --muted2: #8888aa;
  --danger: #ff6b6b;
  --radius: 16px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

/* Background glow */
body::before {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 600px;
  background: radial-gradient(ellipse, rgba(110,231,247,.06) 0%, rgba(249,124,245,.04) 40%, transparent 70%);
  pointer-events: none;
}

/* Logo */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 40px;
  text-decoration: none;
}
.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--cyan), var(--pink));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.logo-text {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}
.logo-text span { color: var(--gold); }

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 24px;
  padding: 40px;
  width: 100%;
  max-width: 420px;
  position: relative;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  border-radius: 24px 24px 0 0;
}

h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  font-weight: 400;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--text), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  font-size: 13px;
  color: var(--muted2);
  margin-bottom: 32px;
  line-height: 1.6;
}

label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 8px;
  font-family: 'DM Mono', monospace;
}

input[type="password"] {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Outfit', sans-serif;
  outline: none;
  transition: border-color .2s;
  margin-bottom: 20px;
}
input[type="password"]:focus {
  border-color: var(--cyan);
}
input[type="password"].error {
  border-color: var(--danger);
}

/* Password strength */
.strength-bar {
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  margin-top: -14px;
  margin-bottom: 20px;
  overflow: hidden;
}
.strength-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .3s, background .3s;
  width: 0%;
}

.strength-label {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  text-align: right;
  margin-top: -16px;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, var(--cyan), var(--pink));
  border: none;
  border-radius: 12px;
  color: #07070f;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
  margin-top: 4px;
}
button:hover { opacity: .9; }
button:active { transform: scale(.98); }
button:disabled { opacity: .5; cursor: not-allowed; }

.status {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 13px;
  text-align: center;
  display: none;
  line-height: 1.5;
}
.status.success {
  background: rgba(79,255,176,.08);
  border: 1px solid rgba(79,255,176,.2);
  color: var(--green);
  display: block;
}
.status.error {
  background: rgba(255,107,107,.08);
  border: 1px solid rgba(255,107,107,.2);
  color: var(--danger);
  display: block;
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--muted2);
  text-decoration: none;
  transition: color .2s;
}
.back-link:hover { color: var(--cyan); }

/* Loading spinner */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(0,0,0,.3);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Success state */
.success-icon {
  font-size: 48px;
  text-align: center;
  margin-bottom: 16px;
  display: none;
}
</style>
</head>
<body>

<a href="/" class="logo">
  <div class="logo-icon">🔭</div>
  <div class="logo-text">X Filter <span>Pro</span></div>
</a>

<div class="card">
  <div class="success-icon" id="successIcon">✅</div>
  <h1 id="cardTitle">Yeni Şifre Belirle</h1>
  <p class="subtitle" id="cardSubtitle">Güvenli bir şifre seç. En az 8 karakter, bir büyük harf ve bir rakam içermeli.</p>

  <div id="formArea">
    <label>Yeni Şifre</label>
    <input type="password" id="newPass" placeholder="••••••••" autocomplete="new-password"/>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-label" id="strengthLabel"></div>

    <label>Şifre Tekrar</label>
    <input type="password" id="confirmPass" placeholder="••••••••" autocomplete="new-password"/>

    <button id="resetBtn" onclick="handleReset()">🔑 Şifremi Güncelle</button>
  </div>

  <div class="status" id="statusMsg"></div>
  <a href="/" class="back-link">← Ana sayfaya dön</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://dkcnwccebhazbnatkhqc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_e_X5iU2qKD0Yy92V8yyuwQ_ZvLKTuXr";

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Token URL'den al
const hashParams = new URLSearchParams(window.location.hash.slice(1));
const accessToken  = hashParams.get("access_token");
const refreshToken = hashParams.get("refresh_token");
const type         = hashParams.get("type");

// Token yoksa hata göster
if (!accessToken || type !== "recovery") {
  showStatus("❌ Geçersiz veya süresi dolmuş link. Lütfen tekrar şifre sıfırlama isteği gönderin.", "error");
  document.getElementById("formArea").style.display = "none";
}

// Supabase session'ı token ile başlat
if (accessToken) {
  sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || "" });
}

// Şifre güç ölçer
document.getElementById("newPass").addEventListener("input", function() {
  const val = this.value;
  const fill = document.getElementById("strengthFill");
  const label = document.getElementById("strengthLabel");
  
  let score = 0;
  if (val.length >= 8) score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  const levels = [
    { pct: 0,   color: "transparent", text: "" },
    { pct: 20,  color: "#ff6b6b",     text: "Çok Zayıf" },
    { pct: 40,  color: "#ffa94d",     text: "Zayıf" },
    { pct: 60,  color: "#ffd166",     text: "Orta" },
    { pct: 80,  color: "#4fffb0",     text: "Güçlü" },
    { pct: 100, color: "#6ee7f7",     text: "Çok Güçlü" },
  ];
  const lvl = levels[Math.min(score, 5)];
  fill.style.width = lvl.pct + "%";
  fill.style.background = lvl.color;
  label.textContent = lvl.text;
  label.style.color = lvl.color;
});

// Enter tuşu
document.getElementById("newPass").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("confirmPass").focus(); });
document.getElementById("confirmPass").addEventListener("keydown", e => { if (e.key === "Enter") handleReset(); });

async function handleReset() {
  const newPass     = document.getElementById("newPass").value;
  const confirmPass = document.getElementById("confirmPass").value;
  const btn         = document.getElementById("resetBtn");

  // Validasyon
  if (newPass.length < 8) {
    showStatus("❌ Şifre en az 8 karakter olmalı.", "error");
    document.getElementById("newPass").classList.add("error");
    return;
  }
  if (newPass !== confirmPass) {
    showStatus("❌ Şifreler eşleşmiyor.", "error");
    document.getElementById("confirmPass").classList.add("error");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Güncelleniyor...';
  clearStatus();

  try {
    const { error } = await sb.auth.updateUser({ password: newPass });
    if (error) throw error;

    // Başarı
    document.getElementById("formArea").style.display = "none";
    document.getElementById("successIcon").style.display = "block";
    document.getElementById("cardTitle").textContent = "Şifren Güncellendi!";
    document.getElementById("cardSubtitle").textContent = "Yeni şifrenle giriş yapabilirsin. Eklentiyi açıp tekrar giriş yap.";
    showStatus("✅ Şifren başarıyla güncellendi.", "success");

    // 3 sn sonra ana sayfaya yönlendir
    setTimeout(() => { window.location.href = "/"; }, 3000);

  } catch(e) {
    showStatus("❌ Hata: " + (e.message || "Şifre güncellenemedi."), "error");
    btn.disabled = false;
    btn.innerHTML = "🔑 Şifremi Güncelle";
  }
}

function showStatus(msg, type) {
  const el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.className = "status " + type;
}
function clearStatus() {
  const el = document.getElementById("statusMsg");
  el.className = "status";
  document.getElementById("newPass").classList.remove("error");
  document.getElementById("confirmPass").classList.remove("error");
}
</script>
</body>
</html>
